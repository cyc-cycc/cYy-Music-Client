name: Build macOS App with Nuitka

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies (VLC, FFmpeg, PortAudio)
      run: |
        brew install --cask vlc
        brew install ffmpeg portaudio

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka
        pip install ordered-set

    - name: Prepare resources (VLC, FFmpeg, PortAudio)
      run: |
        mkdir -p resources/vlc/lib resources/vlc/plugins resources/ffmpeg/bin resources/ffmpeg/lib

        cp /Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib resources/vlc/lib/
        cp /Applications/VLC.app/Contents/MacOS/lib/libvlccore.dylib resources/vlc/lib/
        cp -r /Applications/VLC.app/Contents/MacOS/plugins resources/vlc/

        cd resources/vlc/plugins
        rm -rf video_output gui skins mux services_discovery control lua access_output stream_out
        find codec -name "*.dylib" | grep -v -E "(mad|flac|vorbis|faad|opus|mpg123|a52|dca|speex|theora)" | xargs rm -f
        find demux -name "*.dylib" | grep -v -E "(mp4|ogg|wav|flac|aiff|au|voc|rawaud|mod)" | xargs rm -f
        find packetizer -name "*.dylib" | grep -v -E "(flac|vorbis|mpegaudio|mp4|a52|dts)" | xargs rm -f
        find access -name "*.dylib" | grep -v -E "(file|http|https|ftp)" | xargs rm -f
        find audio_output -name "*.dylib" | grep -v -E "(coreaudio)" | xargs rm -f
        cd ../../..

        FFMPEG_PREFIX=$(brew --prefix ffmpeg)
        cp "$FFMPEG_PREFIX/bin/ffmpeg" resources/ffmpeg/bin/
        if [ -d "$FFMPEG_PREFIX/lib" ]; then
          cp -r "$FFMPEG_PREFIX/lib/"* resources/ffmpeg/lib/
        fi

        PORTAUDIO_LIB=$(brew --prefix portaudio)/lib/libportaudio.dylib
        if [ -f "$PORTAUDIO_LIB" ]; then
          cp "$PORTAUDIO_LIB" resources/ffmpeg/lib/
        fi

    - name: Build with Nuitka
      run: |
        nuitka --standalone \
               --macos-create-app-bundle \
               --enable-plugin=pyqt5 \
               --include-qt-plugins=platforms,imageformats \
               --macos-app-name="cYy Music Client" \
               --product-version="4.2.0" \
               --macos-app-icon=icon.icns \
               --macos-signed-app-name=com.yourcompany.musicdlgui \
               --macos-target-arch=arm64 \
               --macos-app-mode=ui-element \
               --include-module=matplotlib.backends.backend_qt5agg \
               --include-module=numba \
               --include-module=sklearn.utils._cython_blas \
               --include-module=scipy.special._cdflib \
               --include-module=scipy.linalg.cython_blas \
               --include-module=scipy.linalg.cython_lapack \
               --include-module=sounddevice \
               --include-module=librosa \
               --include-module=mutagen \
               --include-module=requests \
               --include-module=filetype \
               --include-module=musicdl \
               --include-module=vlc \
               --include-module=PyQt5.sip \
               --include-data-dir=resources=resources \
               --output-dir=dist \
               main.py

    - name: Create DMG installer
      run: |
        APP_PATH="dist/cYy Music Client.app"
        if [ ! -d "$APP_PATH" ]; then
          echo "App bundle not found"
          exit 1
        fi
        mkdir -p dmg_staging
        cp -R "$APP_PATH" dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "cYy Music Client" -srcfolder dmg_staging -ov -format UDZO "dist/cYy-Music-Client.dmg"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: cYy-Music-Client-macOS-Nuitka
        path: dist/cYy-Music-Client.dmg
        if-no-files-found: error
