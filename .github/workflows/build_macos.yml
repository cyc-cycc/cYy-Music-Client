name: Build macOS App

on:
  push:                   # 当推送代码到仓库时自动触发
    branches: [ main ]    # 只在 main 分支触发（如果你用 master，改成 master）
  workflow_dispatch:      # 也允许你手动在网页上点击运行

jobs:
  build:
    runs-on: macos-latest   # 使用 GitHub 提供的 macOS 最新版虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'   # 选择 Python 版本（3.9~3.11 均可）

    - name: Install system dependencies
      run: |
        # 安装 PyQt5 所需的系统库和 VLC（播放时需要）
        brew install qt5 vlc

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 额外安装打包工具
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --windowed --name "MusicDownloader" musicdlgui.py
    
    - name: Create DMG (using native hdiutil)
      run: |
        # 1. 创建一个临时文件夹，用于存放即将打包进 DMG 的 .app
        mkdir -p dmg_staging
        cp -R "dist/MusicDownloader.app" dmg_staging/
        
        # 2. 使用 hdiutil 创建压缩的只读 DMG
        # -volname: 挂载时显示的名称
        # -srcfolder: 源文件夹
        # -ov: 覆盖已有文件
        # -format UDZO: 压缩的只读格式（标准分发格式）
        hdiutil create -volname "MusicDownloader" -srcfolder dmg_staging -ov -format UDZO "dist/MusicDownloader.dmg"
    
    - name: Upload artifact (now upload the .dmg file!)
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/MusicDownloader.dmg   # 重点：这里改成了 .dmg 文件！
