name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install VLC via cask
      run: |
        brew install --cask vlc
        # （可选）打印 VLC 目录结构，方便调试
        ls -la /Applications/VLC.app/Contents/MacOS/
        ls -la /Applications/VLC.app/Contents/ || true

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller musicdlgui.spec

    - name: Create DMG
      run: |
        mkdir -p dmg_staging
        cp -R "dist/Music-spd-tool_macos-arm64.app" dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "Music-spd-tool_macos-arm64" -srcfolder dmg_staging -ov -format UDZO "dist/Music-spd-tool_macos-arm64.dmg"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/Music-spd-tool_macos-arm64.dmg
