name: Build macOS App

on:
  workflow_dispatch:         # 手动触发，便于测试

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5  # 升级

    - name: Set up Python
      uses: actions/setup-python@v6  # 升级
      with:
        python-version: '3.10'

    - name: Install VLC, FFmpeg and PortAudio
      run: |
        brew untap aws/tap || true
        brew install --cask vlc
        brew install ffmpeg portaudio

        VLC_LIB="/Applications/VLC.app/Contents/MacOS/lib/libvlc.dylib"
        if [ -f "$VLC_LIB" ]; then
          echo "VLC installed successfully: $VLC_LIB"
        else
          echo "VLC library not found at expected location!"
          exit 1
        fi

        FFMPEG_BIN="$(brew --prefix ffmpeg)/bin/ffmpeg"
        if [ -f "$FFMPEG_BIN" ]; then
          echo "FFmpeg installed at: $FFMPEG_BIN"
        else
          echo "FFmpeg not found!"
          exit 1
        fi

        PORTAUDIO_LIB="$(brew --prefix portaudio)/lib/libportaudio.dylib"
        if [ -f "$PORTAUDIO_LIB" ]; then
          echo "PortAudio installed at: $PORTAUDIO_LIB"
        else
          echo "PortAudio not found!"
          exit 1
        fi

    - name: Clean previous builds
      run: |
        rm -rf dist build

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt    # 请确保存在 requirements.txt，或手动列出依赖
        pip install pyinstaller

    - name: Build macOS app with PyInstaller
      run: |
        pyinstaller --clean cYy-Music-Client.spec

    - name: Create DMG installer
      env:
        APP_NAME: cYy-Music-Client_macos-arm64
      run: |
        mkdir -p dmg_staging
        cp -R "dist/${APP_NAME}.app" dmg_staging/
        ln -s /Applications dmg_staging/Applications
        hdiutil create -volname "${APP_NAME}" -srcfolder dmg_staging -ov -format UDZO "dist/${APP_NAME}.dmg"

    - name: Upload DMG artifact
      uses: actions/upload-artifact@v7  # 升级
      with:
        name: cYy-Music-Client-macOS
        path: dist/cYy-Music-Client_macos-arm64.dmg
        if-no-files-found: error
