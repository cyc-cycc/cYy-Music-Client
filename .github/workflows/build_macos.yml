name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest   # 使用 GitHub 提供的 macOS 最新版虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13.14'   # 选择 Python 版本（3.9~3.11 均可）

    - name: Install system dependencies
      run: |
        # 安装 PyQt5 所需的系统库和 VLC（播放时需要）
        brew install qt5 vlc

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 额外安装打包工具
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --windowed --name "Music-spd-tool_macos-arm64" --icon icon.icns musicdlgui.py
    
    - name: Create DMG
      run: |
        # 1. 创建一个临时文件夹，用于存放即将打包进 DMG 的 .app
        mkdir -p dmg_staging
        cp -R "dist/Music-spd-tool_macos-arm64.app" dmg_staging/
        
        # 2. 使用 hdiutil 创建压缩的只读 DMG
        # -volname: 挂载时显示的名称
        # -srcfolder: 源文件夹
        # -ov: 覆盖已有文件
        # -format UDZO: 压缩的只读格式（标准分发格式）
        hdiutil create -volname "Music-spd-tool_macos-arm64" -srcfolder dmg_staging -ov -format UDZO "dist/Music-spd-tool_macos-arm64.dmg"
    
    - name: Upload artifact (now upload the .dmg file!)
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/Music-spd-tool_macos-arm64.dmg   # 重点：这里改成了 .dmg 文件！
