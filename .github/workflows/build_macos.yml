name: Build macOS App

on:
  push:                   # 当推送代码到仓库时自动触发
    branches: [ main ]    # 只在 main 分支触发（如果你用 master，改成 master）
  workflow_dispatch:      # 也允许你手动在网页上点击运行

jobs:
  build:
    runs-on: macos-latest   # 使用 GitHub 提供的 macOS 最新版虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'   # 选择 Python 版本（3.9~3.11 均可）

    - name: Install system dependencies
      run: |
        # 安装 PyQt5 所需的系统库和 VLC（播放时需要）
        brew install qt5 vlc

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 额外安装打包工具
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        # --windowed 表示生成 GUI 应用，不显示命令行窗口
        # --onefile 如果想生成单个可执行文件（.app 仍会是文件夹），但通常我们不使用 --onefile
        pyinstaller --windowed --name "MusicDownloader" musicdlgui.py

    - name: Upload artifact (app bundle)
      uses: actions/upload-artifact@v4
      with:
        name: MusicDownloader-macOS
        path: dist/MusicDownloader.app   # PyInstaller 生成的应用包路径
